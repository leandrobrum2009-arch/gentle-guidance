    <script>
      (function() {
        const host = window.location.hostname;
        const p = 'cached::' + host + '::';
        const cachedColor =
          localStorage.getItem(p + 'primary_color') ||
          localStorage.getItem('cached_primary_color');
        let cachedName =
          localStorage.getItem(p + 'site_name') ||
          localStorage.getItem(p + 'site_title') ||
          localStorage.getItem('cached_site_name') ||
          localStorage.getItem('cached_site_title');
        
        // Prevent old branding from appearing
        if (cachedName && (cachedName.toLowerCase().includes('rifa pro') || cachedName.toLowerCase().includes('rifapro'))) {
          cachedName = null;
        }
        
        if (cachedColor) {
          const hexToHsl = (hex) => {
            hex = hex.replace(/^#/, '');
            let r = 0, g = 0, b = 0;
            if (hex.length === 3) {
              r = parseInt(hex[0] + hex[0], 16);
              g = parseInt(hex[1] + hex[1], 16);
              b = parseInt(hex[2] + hex[2], 16);
            } else if (hex.length === 6) {
              r = parseInt(hex.substring(0, 2), 16);
              g = parseInt(hex.substring(2, 4), 16);
              b = parseInt(hex.substring(4, 6), 16);
            } else return null;
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h = 0, s, l = (max + min) / 2;
            if (max === min) { h = s = 0; } else {
              const d = max - min;
              s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
              switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
              }
              h /= 6;
            }
            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
          };
          const hsl = hexToHsl(cachedColor);
          if (hsl) {
            document.documentElement.style.setProperty('--primary', `${hsl.h} ${hsl.s}% ${hsl.l}%`);
            document.documentElement.style.setProperty('--ring', `${hsl.h} ${hsl.s}% ${hsl.l}%`);
          }
        }
        if (cachedName) {
          document.title = cachedName;
        }
      })();
    </script>

    <!-- 4. SPA + Eventos (um clique alimenta Meta e GA4) -->
    <script>
      (function(){
        var last=location.pathname;
        function pv(){
          if(location.pathname!==last){
            last=location.pathname;
            if(window.fbq) fbq('track','PageView');
            if(window.gtag) gtag('event','page_view',{page_path:location.pathname});
          }
        }
        ['pushState','replaceState'].forEach(function(t){var o=history[t];history[t]=function(){var r=o.apply(this,arguments);pv();return r;};});
        window.addEventListener('popstate',pv);
      })();
      document.addEventListener('DOMContentLoaded', function () {
        var PADRAO=['Lead','InitiateCheckout','AddToCart','Contact','ViewContent','CompleteRegistration','AddPaymentInfo','Purchase','Search','Subscribe'];
        var GA_MAP={Lead:'generate_lead',InitiateCheckout:'begin_checkout',AddToCart:'add_to_cart',Contact:'contact',ViewContent:'view_item',CompleteRegistration:'sign_up',AddPaymentInfo:'add_payment_info',Purchase:'purchase'};
        function uuid(){return (window.crypto&&crypto.randomUUID)?crypto.randomUUID():'e-'+Date.now()+'-'+Math.floor(Math.random()*1e6);}
        function dispara(ev,nome){
          if(window.fbq) fbq((PADRAO.indexOf(ev)>=0)?'track':'trackCustom',ev,{content_name:nome||''},{eventID:uuid()});
          if(window.gtag) gtag('event', GA_MAP[ev]||('click_'+(nome||ev)), {label:nome||ev});
        }
        function bindAll(){
          document.querySelectorAll('[data-fb-event]').forEach(function(el){
            if(el.dataset.bound)return;
            el.dataset.bound='1';
            el.addEventListener('click',function(){dispara(el.getAttribute('data-fb-event'),el.getAttribute('data-fb-name'));});
          });
        }
        bindAll();
        new MutationObserver(bindAll).observe(document.body,{childList:true,subtree:true});
        window.lsDispara = dispara;
      });
    </script>
