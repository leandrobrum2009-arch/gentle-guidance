  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <title>Plataforma de Rifas Online — Sorteios e Prêmios Garantidos</title>
    <link rel="canonical" href="/" />
    <script>
      (function() {
        const cachedColor = localStorage.getItem('cached_primary_color');
        let cachedName = localStorage.getItem('cached_site_name') || localStorage.getItem('cached_site_title');
        
        // Prevent old branding from appearing
        if (cachedName && (cachedName.toLowerCase().includes('rifa pro') || cachedName.toLowerCase().includes('rifapro'))) {
          cachedName = null;
        }
        
        if (cachedColor) {
          const hexToHsl = (hex) => {
            hex = hex.replace(/^#/, '');
            let r = 0, g = 0, b = 0;
            if (hex.length === 3) {
              r = parseInt(hex[0] + hex[0], 16);
              g = parseInt(hex[1] + hex[1], 16);
              b = parseInt(hex[2] + hex[2], 16);
            } else if (hex.length === 6) {
              r = parseInt(hex.substring(0, 2), 16);
              g = parseInt(hex.substring(2, 4), 16);
              b = parseInt(hex.substring(4, 6), 16);
            } else return null;
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h = 0, s, l = (max + min) / 2;
            if (max === min) { h = s = 0; } else {
              const d = max - min;
              s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
              switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
              }
              h /= 6;
            }
            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
          };
          const hsl = hexToHsl(cachedColor);
          if (hsl) {
            document.documentElement.style.setProperty('--primary', `${hsl.h} ${hsl.s}% ${hsl.l}%`);
            document.documentElement.style.setProperty('--ring', `${hsl.h} ${hsl.s}% ${hsl.l}%`);
          }
        }
        if (cachedName) {
          document.title = cachedName;
        }
      })();
    </script>
