name: Deploy Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Verify build output
        run: |
          test -f dist/index.html
          test -f dist/.htaccess

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR || '/public_html/' }}

      - name: Verify live domain
        continue-on-error: true
        run: |
          expected_js="$(grep -o 'assets/[^"]*\.js' dist/index.html | head -n 1)"
          curl -fsSL -H 'Cache-Control: no-cache' "https://sistemapararifas.site/?deploy_check=${GITHUB_SHA}" -o live-index.html
          grep -F "$expected_js" live-index.html

      - name: Deploy to Vercel (sortedomilhao.app)
        env:
          VERCEL_ORG_ID: team_vNzpUbIvVNtHWLq3rlFMkHBP
          VERCEL_PROJECT_ID: prj_qh9FmzfUS1OtuKx4aHyBfTHVMEF0
        run: npx vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
